services:
  - type: web
    name: steamypot-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL
        sync: false
      - key: PASS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: AI_LAYER_URL
        fromService:
          type: web
          name: steamypot-ai-layer
          property: url

  - type: web
    name: steamypot-ai-layer
    runtime: python
    rootDir: AI-Layer
    buildCommand: pip install -r requirements.txt
    startCommand: python gateway.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PORT
        value: 10001
      - key: ENABLE_NGROK_TESTING
        value: "false"
      - key: MONGODB_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

  - type: static
    name: steamypot-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_SERVER_URL
        fromService:
          type: web
          name: steamypot-backend
          property: url
